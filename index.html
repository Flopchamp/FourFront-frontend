<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Investment Knowledge Club</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header class="container py-4">
        <h1 class="text-center">Investment Knowledge Club</h1>
    </header>
    <main class="container">
        <section id="profile" class="mb-4">
            <!-- Profile card placeholder -->
        </section>
        <section id="scores" class="mb-4">
            <!-- Score cards placeholder -->
        </section>
        <section id="info" class="mb-4">
            <!-- Info section placeholder -->
        </section>
        <section id="memberships" class="mb-4">
            <!-- Memberships placeholder -->
        </section>
        <section id="details-link" class="mb-4">
            <!-- Details link placeholder -->
        </section>
    </main>
    <footer class="container text-center py-3 small text-muted">
        <!-- Footer placeholder -->
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/scripts.js"></script>
</body>
</html>
